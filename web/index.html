<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Xopera Festival</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #cc0000;
      --red-bright: #e82222;
      --white: #f0eeec;
      --bg: #060404;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      opacity: 0;
      transition: opacity 0.5s ease;
      font-family: 'Courier Prime', monospace;
    }
    body.loaded { opacity: 1; }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
    }

    .home-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
      text-align: center;
      gap: 0;
    }

    .home-logo {
      width: min(460px, 80vw);
      margin-bottom: 2.2rem;
      filter: drop-shadow(0 0 40px rgba(200,0,0,0.45));
      animation: logoPulse 5s ease-in-out infinite;
      will-change: filter;
    }

    @keyframes logoPulse {
      0%,100% { filter: drop-shadow(0 0 30px rgba(200,0,0,0.35)); }
      50%      { filter: drop-shadow(0 0 65px rgba(220,10,10,0.65)); }
    }

    .home-tagline {
      font-family: 'Courier Prime', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(240,238,236,0.4);
      margin-bottom: 2.8rem;
    }

    /* Botons nav */
    .nav-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      align-items: center;
    }

    .nav-row {
      display: flex;
      gap: 0.65rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .nav-btn {
      font-family: 'Oswald', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--white);
      border: 1.5px solid rgba(240,238,236,0.6);
      border-radius: 6px;
      padding: 0.68rem 1.35rem;
      background: rgba(6,4,4,0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      white-space: nowrap;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: var(--white);
      color: #060404;
      border-color: var(--white);
    }

    .footer-tag {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Courier Prime', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: rgba(240,238,236,0.22);
      z-index: 2;
      text-transform: uppercase;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="scanlines"></div>

  <main class="home-wrap">
    <img src="assets/logo-white-red.png" alt="La Xopera Festival" class="home-logo" id="main-logo">
    <p class="home-tagline">Autogestió · Estivella · Festival</p>

    <nav class="nav-buttons">
      <div class="nav-row">
        <a href="edicions-anteriors.html" class="nav-btn">Edicions Anteriors</a>
        <a href="proxima-edicio.html"     class="nav-btn">Pròxima Edició</a>
        <a href="xarxes-socials.html"     class="nav-btn">Xarxes Socials</a>
        <a href="marxandising.html"       class="nav-btn">Botiga</a>
      </div>
      <div class="nav-row">
        <a href="manifest.html"           class="nav-btn">Manifest</a>
        <a href="socis.html"              class="nav-btn">Socis</a>
        <a href="contacte.html"           class="nav-btn">Contacte</a>
      </div>
    </nav>
  </main>

  <p class="footer-tag">La terra no es ven · La vida no es negocia</p>

  <script>
  (function(){
    /* ── Canvas setup ── */
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H;
    const mouse  = { x: 0, y: 0, on: false };

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      mouse.x = W / 2;
      mouse.y = H / 2;
    }
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.on = true; });

    /* ── Particles ── */
    const REDS = [
      [55,0,0], [90,0,0], [130,5,5], [175,10,10], [210,20,20], [40,0,0]
    ];
    const N = 150;
    const ps = [];

    function mkP() {
      const c = REDS[Math.floor(Math.random() * REDS.length)];
      return {
        x:  Math.random() * (W||800),
        y:  Math.random() * (H||600),
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        r:  Math.random() * 2.2 + 0.3,
        a:  Math.random() * 0.65 + 0.1,
        ad: Math.random() * 0.0025 + 0.001,
        c:  c,
      };
    }

    for (let i = 0; i < N; i++) ps.push(mkP());

    /* ── Glitch state ── */
    let glitchCd = 220, glitch = null;

    /* ── Render loop ── */
    function draw() {
      /* Trail */
      ctx.fillStyle = 'rgba(6,4,4,0.13)';
      ctx.fillRect(0, 0, W, H);

      /* Centre glow */
      const cg = ctx.createRadialGradient(W*.5, H*.5, 0, W*.5, H*.5, Math.max(W,H)*.55);
      cg.addColorStop(0, 'rgba(22,2,2,0.09)');
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg;
      ctx.fillRect(0, 0, W, H);

      /* Mouse aura */
      if (mouse.on) {
        const mg = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 140);
        mg.addColorStop(0, 'rgba(190,0,0,0.13)');
        mg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = mg;
        ctx.fillRect(0, 0, W, H);

        /* Streaks */
        if (Math.random() < 0.045) {
          ctx.beginPath();
          ctx.moveTo(mouse.x + (Math.random()-.5)*90, mouse.y + (Math.random()-.5)*90);
          ctx.lineTo(mouse.x + (Math.random()-.5)*200, mouse.y + (Math.random()-.5)*200);
          ctx.strokeStyle = `rgba(180,0,0,${(Math.random()*.2+.04).toFixed(2)})`;
          ctx.lineWidth = Math.random() * 1.5 + .2;
          ctx.stroke();
        }
      }

      /* Particles */
      for (const p of ps) {
        const dx = p.x - mouse.x, dy = p.y - mouse.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < 18000) {
          const d = Math.sqrt(d2);
          const f = (135 - d) / 135 * .7;
          p.vx += (dx/d)*f; p.vy += (dy/d)*f;
        }
        p.vx *= .97; p.vy *= .97;
        p.x += p.vx; p.y += p.vy;
        p.a -= p.ad;
        if (p.a <= 0 || p.x < -4 || p.x > W+4 || p.y < -4 || p.y > H+4) {
          Object.assign(p, mkP());
          p.x = Math.random() * W;
          p.y = Math.random() * H;
          p.a = Math.random() * .55 + .2;
        }
        const [r,g,b] = p.c;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${r},${g},${b},${p.a.toFixed(2)})`;
        ctx.fill();
      }

      /* Glitch */
      glitchCd--;
      if (!glitch && glitchCd <= 0 && Math.random() < .025) {
        glitch = {
          lines: Array.from({length: 5}, () => ({
            y: (Math.random()*H)|0,
            h: (Math.random()*9+2)|0,
            dx: ((Math.random()-.5)*28)|0
          })),
          life: 10
        };
        glitchCd = 180 + Math.random()*100;
      }
      if (glitch) {
        for (const l of glitch.lines) {
          try {
            const d = ctx.getImageData(0, l.y, W, l.h);
            ctx.putImageData(d, l.dx, l.y);
          } catch(e){}
        }
        if (--glitch.life <= 0) glitch = null;
      }

      requestAnimationFrame(draw);
    }
    draw();

    /* ── Logo micro-glitch ── */
    const logo = document.getElementById('main-logo');
    function logoGlitch() {
      logo.style.transform = `translate(${(Math.random()-.5)*5}px,${(Math.random()-.5)*3}px) skewX(${(Math.random()-.5)*2}deg)`;
      setTimeout(() => { logo.style.transform = ''; }, 100 + Math.random()*80);
      setTimeout(logoGlitch, 3500 + Math.random()*4000);
    }
    setTimeout(logoGlitch, 3000);

    /* ── Transicions de pàgina ── */
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', function(e){
        e.preventDefault();
        const dest = this.getAttribute('href');
        document.body.style.transition = 'opacity .28s ease';
        document.body.style.opacity = '0';
        setTimeout(() => { location.href = dest; }, 300);
      });
    });

    /* ── Fade in ── */
    requestAnimationFrame(() => setTimeout(() => document.body.classList.add('loaded'), 30));
  })();
  </script>
</body>
</html>
